<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadHook MVP</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app">
    <h1>ThreadHook MVP</h1>

    <label class="label">Backend URL</label>
    <input id="backendUrl" class="input" type="text" value="http://127.0.0.1:8000" />

    <label class="label">Provider</label>
    <select id="provider" class="input">
      <option value="claude">claude</option>
      <option value="chatgpt">chatgpt</option>
      <option value="gemini">gemini</option>
      <option value="grok">grok</option>
    </select>

    <label class="label">등록 방식</label>
    <select id="authMethod" class="input">
      <option value="api_key">API Key</option>
      <option value="oauth">OAuth 인증</option>
    </select>

    <section id="apiKeyArea">
      <label class="label">API Key</label>
      <input id="apiKey" class="input" type="password" placeholder="sk-..." />
      <button id="saveKeyBtn" class="sub">API Key 저장</button>
    </section>

    <section id="oauthArea" class="hidden">
      <label class="label">OAuth 인증</label>
      <button id="oauthRegisterBtn" class="sub">OAuth 인증 등록</button>
      <p class="hint">인증 페이지에서 승인하면 자동으로 등록 상태를 확인합니다.</p>
    </section>

    <div class="row single">
      <button id="extractBtn">페이지 추출</button>
    </div>

    <label class="label">Tone</label>
    <select id="tone" class="input">
      <option value="professional">professional</option>
      <option value="neutral">neutral</option>
      <option value="casual">casual</option>
    </select>

    <label class="label">Length</label>
    <select id="length" class="input">
      <option value="medium">medium</option>
      <option value="short">short</option>
      <option value="long">long</option>
    </select>

    <button id="generateBtn" class="primary">스레드 생성</button>

    <label class="label">상태</label>
    <div id="status" class="status">대기 중</div>

    <label class="label">결과</label>
    <textarea id="output" class="output" readonly></textarea>

    <section class="footer-info">
      <div class="footer-title">미래이음연구소 | 개발 민토레인</div>
      <div class="footer-row">연락처 <a href="tel:01033434000">010-3343-4000</a></div>
      <div class="footer-row">이메일 <a href="mailto:mintorain@gmail.com">mintorain@gmail.com</a></div>
      <div class="footer-links">
        <a href="https://mintorain.duonedu.net" target="_blank" rel="noopener noreferrer">홈페이지</a>
        <a href="https://www.youtube.com/@mintorain7" target="_blank" rel="noopener noreferrer">유튜브</a>
        <a href="https://www.instagram.com/mintorain/" target="_blank" rel="noopener noreferrer">인스타</a>

        <a href="http://pf.kakao.com/_UzjZG/chat" target="_blank" rel="noopener noreferrer">고객센터</a>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
